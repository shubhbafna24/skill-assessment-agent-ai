services:
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=skill_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrator
    command: npx prisma db push --skip-generate
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/skill_agent
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/skill_agent
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
